services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - clean_crm_postgres:/var/lib/postgresql/data

  clean-crm:
    build:
      context: .
    environment:
      YCLOUD_API_KEY: ${YCLOUD_API_KEY}
      YCLOUD_WEBHOOK_SECRET: ${YCLOUD_WEBHOOK_SECRET}
      YCLOUD_WABA_ID: ${YCLOUD_WABA_ID}
      DATABASE_URL: ${DATABASE_URL}
      CRM_JWT_SECRET: ${CRM_JWT_SECRET}
      YCLOUD_SENDER_NUMBERS: ${YCLOUD_SENDER_NUMBERS}
    depends_on:
      - db
    ports:
      - "8000:8000"
    image: clean-crm:latest

volumes:
  clean_crm_postgres: